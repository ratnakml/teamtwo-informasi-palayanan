<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Jaringan Kampus</title>
  <link rel="stylesheet" href="style.css">
  <style>body {
  font-family: "Poppins", sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 50px 0;
}

.container {
  width: 90%;
  max-width: 900px;
  margin: auto;
  text-align: center;
}

h1 {
  font-size: 32px;
  font-weight: 600;
  color: #1f2d3d;
  margin-bottom: 40px;
}

h1 i {
  color: #2f80ed;
  margin-right: 8px;
}

.card {
  background: white;
  padding: 18px 25px;
  border-radius: 15px;
  margin: 14px 0;
  font-size: 19px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 15px;
  border-left: 6px solid #2f80ed;
  cursor: pointer;

  box-shadow: 0 3px 10px rgba(0,0,0,0.06);
  transition: 0.30s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

.card i {
  font-size: 22px;
  color: #2f80ed;
}
</style>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

  <div class="container">
      <h1><i class="fa-solid fa-globe"></i> Manajemen Jaringan Kampus</h1>

      <div class="card"><i class="fa-solid fa-wifi"></i> Pengelolaan infrastruktur LAN & Wi-Fi kampus</div>
      <div class="card"><i class="fa-solid fa-screwdriver-wrench"></i> Pemeliharaan jaringan agar tetap stabil dan aman</div>
      <div class="card"><i class="fa-solid fa-chart-bar"></i> Manajemen bandwidth civitas kampus</div>
      <div class="card"><i class="fa-solid fa-gear"></i> Mengatur alokasi kapasitas internet secara efisien</div>
  </div>

</body>
</html>
